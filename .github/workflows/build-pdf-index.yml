# file: .github/workflows/build-pdf-index.yml
name: Build PDF Index

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "audio/**"
      - "audios/**"
      - "media/**"
      - "files/**"
      - "downloads/**"
      - "scripts/build_pdf_index.py"
      - ".github/workflows/build-pdf-index.yml"
      - "*.html"
      - "**/*.html"

permissions:
  contents: write

jobs:
  build-pdf-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build PDF index
        run: python scripts/build_pdf_index.py

      - name: Commit pdf-index.json
        shell: bash
        run: |
          if git diff --quiet -- docs/pdf-index.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/pdf-index.json
          git commit -m "chore: update pdf-index.json"
          git push
