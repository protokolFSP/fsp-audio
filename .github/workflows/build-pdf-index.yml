name: Build PDF Index

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf-index:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show repo tree
        run: |
          pwd
          ls -la
          echo "---- docs before ----"
          ls -la docs || true
          echo "---- scripts ----"
          ls -la scripts || true

      - name: Build pdf-index.json
        run: python scripts/build_pdf_index.py

      - name: Show generated file
        run: |
          echo "---- docs after build ----"
          ls -la docs || true
          echo "---- pdf-index.json ----"
          cat docs/pdf-index.json || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/pdf-index.json
          git status

          if git diff --cached --quiet; then
            echo "No staged changes"
            exit 0
          fi

          git commit -m "chore: rebuild pdf-index.json [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
