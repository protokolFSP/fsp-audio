
# .github/workflows/build-pdf-index.yml

name: Build PDF Index

on:

  workflow_dispatch:

  push:

    branches:

      - main

    paths:

      - "docs/**"

      - "scripts/build_pdf_index.py"

      - ".github/workflows/build-pdf-index.yml"

permissions:

  contents: write

jobs:

  build-pdf-index:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout

        uses: actions/checkout@v4

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.11"

      - name: Build PDF Index

        run: python scripts/build_pdf_index.py

      - name: Commit generated pdf-index.json

        run: |

          if git diff --quiet -- docs/pdf-index.json; then

            echo "No changes"

            exit 0

          fi

          git config user.name "github-actions[bot]"

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/pdf-index.json

          git commit -m "chore: update pdf-index.json"

          git push
