<!doctype html>

<html lang="tr">

<head>

  <meta charset="utf-8" />

  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>PDF</title>

  <style>

    :root{

      --bg:#f3f4f6;

      --panel:#ffffff;

      --text:#111827;

      --muted:#6b7280;

      --line:#e5e7eb;

      --shadow:0 10px 30px rgba(0,0,0,.06);

    }

    *{

      box-sizing:border-box;

    }

    html, body{

      margin:0;

      padding:0;

      width:100%;

      height:100%;

      background:var(--bg);

      color:var(--text);

      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;

      overflow:hidden;

    }

    body{

      width:100%;

      max-width:100%;

      min-width:0;

    }

    #app{

      position:fixed;

      inset:0;

      display:flex;

      flex-direction:column;

      width:100%;

      height:100%;

      min-width:0;

      background:var(--bg);

      overflow:hidden;

    }

    #topbar{

      flex:0 0 auto;

      display:flex;

      align-items:center;

      justify-content:space-between;

      gap:10px;

      padding:10px 12px;

      background:#fff;

      border-bottom:1px solid var(--line);

      box-shadow:0 1px 0 rgba(0,0,0,.03);

      z-index:2;

    }

    #title{

      min-width:0;

      flex:1 1 auto;

      font-size:1rem;

      font-weight:750;

      white-space:nowrap;

      overflow:hidden;

      text-overflow:ellipsis;

    }

    #actions{

      display:flex;

      gap:8px;

      flex-wrap:wrap;

      flex:0 0 auto;

    }

    .btn{

      height:38px;

      padding:0 12px;

      border-radius:12px;

      border:1px solid var(--line);

      background:#fff;

      color:var(--text);

      cursor:pointer;

      font-size:.92rem;

      font-weight:650;

      text-decoration:none;

      display:inline-flex;

      align-items:center;

      justify-content:center;

    }

    .btn:hover{

      background:#f9fafb;

    }

    #status{

      flex:0 0 auto;

      padding:8px 12px;

      background:#fff;

      color:var(--muted);

      font-size:.92rem;

      border-bottom:1px solid var(--line);

      white-space:nowrap;

      overflow:hidden;

      text-overflow:ellipsis;

    }

    #viewerWrap{

      flex:1 1 auto;

      min-height:0;

      overflow:auto;

      overflow-x:hidden;

      padding:10px 8px 18px;

      -webkit-overflow-scrolling:touch;

    }

    #viewer{

      display:flex;

      flex-direction:column;

      align-items:center;

      gap:14px;

      width:100%;

      min-width:0;

    }

    .pageCard{

      width:fit-content;

      max-width:100%;

      background:#fff;

      border:1px solid #e5e7eb;

      box-shadow:0 10px 28px rgba(0,0,0,.08);

      border-radius:8px;

      overflow:hidden;

    }

    .pageCanvas{

      display:block;

      max-width:100%;

      width:auto;

      height:auto;

      background:#fff;

    }

    .pageMeta{

      padding:8px 10px;

      font-size:.88rem;

      color:var(--muted);

      border-top:1px solid #eee;

      background:#fff;

      text-align:center;

    }

    .loading,

    .error{

      width:min(720px, 100%);

      background:#fff;

      border-radius:12px;

      padding:14px;

      box-shadow:0 8px 20px rgba(0,0,0,.06);

    }

    .loading{

      color:var(--muted);

      text-align:center;

    }

    .error{

      border:1px solid #fecaca;

      color:#991b1b;

      line-height:1.45;

      word-break:break-word;

    }

    @media (max-width: 720px){

      #topbar{

        align-items:flex-start;

        flex-wrap:wrap;

      }

      #title{

        flex:1 1 100%;

        white-space:normal;

        overflow:visible;

        text-overflow:clip;

      }

      #viewerWrap{

        padding:8px 4px 14px;

      }

      .btn{

        height:36px;

        padding:0 10px;

      }

    }

  </style>

</head>

<body>

  <div id="app">

    <div id="topbar">

      <div id="title">PDF yükleniyor…</div>

      <div id="actions">

        <button id="downloadBtn" class="btn" type="button">İndir</button>

        <a id="openBtn" class="btn" href="#" target="_blank" rel="noopener">Yeni sekmede aç</a>

      </div>

    </div>

    <div id="status">Hazırlanıyor…</div>

    <div id="viewerWrap">

      <div id="viewer">

        <div class="loading">PDF yükleniyor…</div>

      </div>

    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script>

    pdfjsLib.GlobalWorkerOptions.workerSrc =

      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const params = new URLSearchParams(location.search);

    const rawPdfUrl = params.get("pdf") || "";

    const rawName = params.get("name") || "";

    const titleEl = document.getElementById("title");

    const statusEl = document.getElementById("status");

    const viewerEl = document.getElementById("viewer");

    const viewerWrapEl = document.getElementById("viewerWrap");

    const openBtn = document.getElementById("openBtn");

    const downloadBtn = document.getElementById("downloadBtn");

    let currentPdfUrl = "";

    let currentFileName = "";

    let renderToken = 0;

    let activeLoadingTask = null;

    let resizeTimer = 0;

    function decodeSafe(value){

      try{

        return decodeURIComponent(value);

      }catch{

        return value;

      }

    }

    function absoluteUrl(input){

      try{

        return new URL(decodeSafe(input), location.href).toString();

      }catch{

        return decodeSafe(input);

      }

    }

    function fileNameFromUrl(url){

      try{

        const u = new URL(url, location.href);

        const raw = (u.pathname || "").split("/").pop() || "PDF";

        return decodeSafe(raw);

      }catch{

        return "PDF";

      }

    }

    function buildFreshUrl(url){

      const u = new URL(url, location.href);

      u.searchParams.set("_ts", String(Date.now()));

      return u.toString();

    }

    function setStatus(text){

      statusEl.textContent = text || "";

    }

    function clearViewer(){

      viewerEl.innerHTML = "";

    }

    function showLoading(text){

      clearViewer();

      const box = document.createElement("div");

      box.className = "loading";

      box.textContent = text || "PDF yükleniyor…";

      viewerEl.appendChild(box);

    }

    function showError(message){

      clearViewer();

      const box = document.createElement("div");

      box.className = "error";

      box.textContent = message || "PDF yüklenemedi.";

      viewerEl.appendChild(box);

      setStatus("Hata");

    }

    function createPageCard(pageNo, totalPages, canvas){

      const card = document.createElement("div");

      card.className = "pageCard";

      const meta = document.createElement("div");

      meta.className = "pageMeta";

      meta.textContent = `Sayfa ${pageNo} / ${totalPages}`;

      canvas.className = "pageCanvas";

      card.appendChild(canvas);

      card.appendChild(meta);

      return card;

    }

    async function fetchPdfBuffer(url){

      const res = await fetch(buildFreshUrl(url), {

        method: "GET",

        cache: "no-store",

        mode: "cors"

      });

      if (!res.ok){

        throw new Error(`PDF indirilemedi: HTTP ${res.status}`);

      }

      return await res.arrayBuffer();

    }

    async function downloadPdf(url, filename){

      try{

        const res = await fetch(buildFreshUrl(url), {

          method: "GET",

          cache: "no-store",

          mode: "cors"

        });

        if (!res.ok){

          throw new Error(`HTTP ${res.status}`);

        }

        const blob = await res.blob();

        const objectUrl = URL.createObjectURL(blob);

        const a = document.createElement("a");

        a.href = objectUrl;

        a.download = filename || "document.pdf";

        document.body.appendChild(a);

        a.click();

        a.remove();

        setTimeout(() => URL.revokeObjectURL(objectUrl), 30000);

      }catch(err){

        console.warn("İndirme fallback:", err);

        window.open(buildFreshUrl(url), "_blank", "noopener");

      }

    }

    async function renderPdf(url){

      const token = ++renderToken;

      currentPdfUrl = absoluteUrl(url);

      currentFileName = decodeSafe(rawName) || fileNameFromUrl(currentPdfUrl);

      if (!currentPdfUrl){

        showError("PDF yolu bulunamadı.");

        return;

      }

      document.title = currentFileName || "PDF";

      titleEl.textContent = currentFileName || "PDF";

      openBtn.href = buildFreshUrl(currentPdfUrl);

      if (activeLoadingTask && typeof activeLoadingTask.destroy === "function"){

        try{

          activeLoadingTask.destroy();

        }catch{}

      }

      showLoading("PDF yükleniyor…");

      setStatus("PDF indiriliyor…");

      try{

        const pdfBuffer = await fetchPdfBuffer(currentPdfUrl);

        if (token !== renderToken) return;

        setStatus("PDF işleniyor…");

        const loadingTask = pdfjsLib.getDocument({

          data: pdfBuffer

        });

        activeLoadingTask = loadingTask;

        const pdf = await loadingTask.promise;

        if (token !== renderToken){

          try{

            if (typeof pdf.destroy === "function") pdf.destroy();

          }catch{}

          return;

        }

        clearViewer();

        setStatus(`Toplam ${pdf.numPages} sayfa`);

        const wrapWidth = Math.max(280, Math.floor(viewerWrapEl.clientWidth - 8));

        for (let pageNo = 1; pageNo <= pdf.numPages; pageNo++){

          if (token !== renderToken) return;

          setStatus(`Sayfa ${pageNo} / ${pdf.numPages} hazırlanıyor…`);

          const page = await pdf.getPage(pageNo);

          const baseViewport = page.getViewport({ scale: 1 });

          const scale = Math.min(2, wrapWidth / baseViewport.width);

          const viewport = page.getViewport({ scale });

          const canvas = document.createElement("canvas");

          const ctx = canvas.getContext("2d", { alpha: false });

          const outputScale = Math.min(window.devicePixelRatio || 1, 2);

          canvas.width = Math.floor(viewport.width * outputScale);

          canvas.height = Math.floor(viewport.height * outputScale);

          canvas.style.width = `${Math.floor(viewport.width)}px`;

          canvas.style.height = `${Math.floor(viewport.height)}px`;

          const transform = outputScale !== 1

            ? [outputScale, 0, 0, outputScale, 0, 0]

            : null;

          await page.render({

            canvasContext: ctx,

            viewport,

            transform

          }).promise;

          if (token !== renderToken) return;

          viewerEl.appendChild(createPageCard(pageNo, pdf.numPages, canvas));

        }

        setStatus(`Yüklendi · ${pdf.numPages} sayfa`);

      }catch(err){

        console.error(err);

        if (token !== renderToken) return;

        showError(`PDF yüklenemedi: ${err?.message || "bilinmeyen hata"}`);

      }

    }

    downloadBtn.addEventListener("click", async () => {

      if (!currentPdfUrl) return;

      await downloadPdf(currentPdfUrl, currentFileName || "document.pdf");

    });

    window.addEventListener("resize", () => {

      clearTimeout(resizeTimer);

      resizeTimer = setTimeout(() => {

        if (!currentPdfUrl) return;

        renderPdf(currentPdfUrl);

      }, 220);

    });

    renderPdf(absoluteUrl(rawPdfUrl));

  </script>

</body>

</html>
