<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PDF</title>

  <style>
    :root{
      --bg:#eef2f7;
      --panel:#ffffff;
      --border:#d8d8d8;
      --text:#111827;
      --muted:#6b7280;
      --hover:#f8fafc;
    }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
    }

    body{
      display:flex;
      flex-direction:column;
    }

    #topbar{
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      background:var(--panel);
      border-bottom:1px solid var(--border);
      box-shadow:0 1px 0 rgba(0,0,0,.04);
      z-index:5;
    }

    #name{
      min-width:0;
      flex:1 1 auto;
      font-weight:700;
      font-size:.96rem;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    #actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex:0 0 auto;
      flex-wrap:wrap;
    }

    .btn{
      height:36px;
      padding:0 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      cursor:pointer;
      font-size:.92rem;
      font-weight:650;
    }

    .btn:hover{ background:var(--hover); }
    .btn:disabled{ opacity:.55; cursor:default; }

    #status{
      flex:0 0 auto;
      padding:8px 12px;
      background:#fff;
      color:var(--muted);
      font-size:.9rem;
      border-bottom:1px solid var(--border);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    #viewerWrap{
      flex:1 1 auto;
      min-height:0;
      background:#cfd6df;
    }

    #pdfFrame{
      display:block;
      width:100%;
      height:100%;
      border:0;
      background:#fff;
    }

    @media (max-width: 720px){
      #topbar{
        align-items:flex-start;
        flex-wrap:wrap;
      }

      #name{
        flex:1 1 100%;
        white-space:normal;
      }
    }
  </style>
</head>
<body>
  <div id="topbar">
    <div id="name">PDF</div>
    <div id="actions">
      <button id="reloadBtn" class="btn" type="button">Yenile</button>
      <button id="downloadBtn" class="btn" type="button">İndir</button>
      <button id="copyBtn" class="btn" type="button">Hepsini kopyala</button>
      <button id="openBtn" class="btn" type="button">Yeni sekmede aç</button>
    </div>
  </div>

  <div id="status">Hazırlanıyor…</div>

  <div id="viewerWrap">
    <iframe id="pdfFrame" title="PDF görüntüleyici"></iframe>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.js";

    const params = new URLSearchParams(location.search);
    const rawPdfUrl = params.get("pdf") || "";
    const rawName = params.get("name") || "";

    const nameEl = document.getElementById("name");
    const statusEl = document.getElementById("status");
    const pdfFrame = document.getElementById("pdfFrame");
    const reloadBtn = document.getElementById("reloadBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const copyBtn = document.getElementById("copyBtn");
    const openBtn = document.getElementById("openBtn");

    let currentBlobUrl = "";

    function decodeSafe(value){
      try{
        return decodeURIComponent(value);
      }catch{
        return value;
      }
    }

    function sanitizeFileName(name){
      const clean = String(name || "").trim().replace(/[\\/:*?"<>|]+/g, "_");
      return clean || "document.pdf";
    }

    function ensurePdfExt(name){
      return /\.pdf$/i.test(name) ? name : `${name}.pdf`;
    }

    function fileNameFromUrl(url){
      try{
        const u = new URL(url, location.href);
        return decodeSafe((u.pathname || "").split("/").pop() || "PDF");
      }catch{
        return "PDF";
      }
    }

    function getDisplayName(){
      const base = decodeSafe(rawName).trim() || fileNameFromUrl(rawPdfUrl);
      return ensurePdfExt(sanitizeFileName(base));
    }

    function buildFreshUrl(url){
      const u = new URL(url, location.href);
      u.searchParams.set("_ts", String(Date.now()));
      return u.toString();
    }

    function setStatus(text){
      statusEl.textContent = text || "";
    }

    function revokeBlobUrl(){
      if (!currentBlobUrl) return;
      try{ URL.revokeObjectURL(currentBlobUrl); }catch{}
      currentBlobUrl = "";
    }

    function setTitle(){
      const fileName = getDisplayName();
      nameEl.textContent = fileName;
      document.title = fileName;
    }

    function setFrameSrc(url){
      if (!url){
        setStatus("PDF yolu bulunamadı.");
        pdfFrame.removeAttribute("src");
        return;
      }
      setStatus("PDF yükleniyor…");
      pdfFrame.src = `${url}#view=FitH`;
    }

    async function fetchPdfBytes(url){
      const res = await fetch(url, {
        mode: "cors",
        cache: "no-store",
        credentials: "omit"
      });
      if (!res.ok) throw new Error(`PDF indirilemedi (${res.status})`);
      const buf = await res.arrayBuffer();
      return new Uint8Array(buf);
    }

    async function initViewer(){
      setTitle();

      if (!rawPdfUrl){
        setStatus("PDF yolu bulunamadı.");
        downloadBtn.disabled = true;
        copyBtn.disabled = true;
        openBtn.disabled = true;
        return;
      }

      const freshUrl = buildFreshUrl(rawPdfUrl);
      setFrameSrc(freshUrl);
    }

    pdfFrame.addEventListener("load", () => {
      setStatus("Yüklendi");
    });

    pdfFrame.addEventListener("error", () => {
      setStatus("PDF görüntülenemedi");
    });

    reloadBtn.addEventListener("click", () => {
      setFrameSrc(buildFreshUrl(rawPdfUrl));
    });

    downloadBtn.addEventListener("click", async () => {
      if (!rawPdfUrl) return;

      const oldText = downloadBtn.textContent;
      downloadBtn.disabled = true;
      downloadBtn.textContent = "İndiriliyor…";

      try{
        const bytes = await fetchPdfBytes(buildFreshUrl(rawPdfUrl));
        const blob = new Blob([bytes], { type: "application/pdf" });

        revokeBlobUrl();
        currentBlobUrl = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = currentBlobUrl;
        a.download = getDisplayName();
        document.body.appendChild(a);
        a.click();
        a.remove();

        setStatus("İndirme başlatıldı");
      }catch(err){
        console.error(err);
        try{
          const a = document.createElement("a");
          a.href = buildFreshUrl(rawPdfUrl);
          a.download = getDisplayName();
          a.target = "_blank";
          a.rel = "noopener";
          document.body.appendChild(a);
          a.click();
          a.remove();
          setStatus("Blob indirme başarısız, doğrudan bağlantı açıldı");
        }catch{
          setStatus(`İndirme başarısız: ${err?.message || "bilinmeyen hata"}`);
        }
      }finally{
        downloadBtn.disabled = false;
        downloadBtn.textContent = oldText;
      }
    });

    copyBtn.addEventListener("click", async () => {
      if (!rawPdfUrl) return;

      const oldText = copyBtn.textContent;
      copyBtn.disabled = true;
      copyBtn.textContent = "Kopyalanıyor…";

      try{
        setStatus("Metin çıkarılıyor…");
        const bytes = await fetchPdfBytes(buildFreshUrl(rawPdfUrl));

        const loadingTask = pdfjsLib.getDocument({
          data: bytes,
          useWorkerFetch: false,
          isEvalSupported: false
        });

        const pdf = await loadingTask.promise;
        const pages = [];

        for (let pageNo = 1; pageNo <= pdf.numPages; pageNo++){
          setStatus(`Metin çıkarılıyor: ${pageNo}/${pdf.numPages}`);
          const page = await pdf.getPage(pageNo);
          const textContent = await page.getTextContent();

          const pageText = (textContent.items || [])
            .map((item) => String(item?.str || "").trim())
            .filter(Boolean)
            .join(" ");

          if (pageText) pages.push(pageText);
        }

        try{ await loadingTask.destroy(); }catch{}

        const text = pages.join("\n\n").trim();
        if (!text) throw new Error("PDF içinde kopyalanabilir metin bulunamadı");

        await navigator.clipboard.writeText(text);
        setStatus("Tüm metin panoya kopyalandı");
      }catch(err){
        console.error(err);
        setStatus(`Kopyalama başarısız: ${err?.message || "metin çıkarılamadı"}`);
      }finally{
        copyBtn.disabled = false;
        copyBtn.textContent = oldText;
      }
    });

    openBtn.addEventListener("click", () => {
      if (!rawPdfUrl) return;
      window.open(buildFreshUrl(rawPdfUrl), "_blank", "noopener");
    });

    window.addEventListener("beforeunload", () => {
      revokeBlobUrl();
    });

    initViewer();
  </script>
</body>
</html>
