<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PDF</title>
  <style>
    :root{
      --bg:#f3f4f6;
      --panel:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --shadow:0 10px 30px rgba(0,0,0,.06);
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
    }

    body{
      width:100vw;
      height:100vh;
    }

    #app{
      position:fixed;
      inset:0;
      width:100vw;
      height:100vh;
      background:var(--bg);
      overflow:hidden;
    }

    #pdfFrame{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      background:#fff;
      display:block;
    }

    #overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:rgba(243,244,246,.96);
      z-index:10;
      transition:opacity .18s ease, visibility .18s ease;
    }

    #overlay.hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .card{
      width:min(720px, calc(100vw - 32px));
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:18px;
    }

    .title{
      margin:0 0 8px 0;
      font-size:1rem;
      font-weight:750;
      line-height:1.4;
      word-break:break-word;
    }

    .text{
      margin:0;
      color:var(--muted);
      line-height:1.5;
      font-size:.95rem;
      word-break:break-word;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:14px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:0 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      text-decoration:none;
      font-size:.92rem;
      font-weight:650;
      cursor:pointer;
    }

    .btn:hover{
      background:#f9fafb;
    }

    .spinner{
      width:18px;
      height:18px;
      border:2px solid #d1d5db;
      border-top-color:#2563eb;
      border-radius:999px;
      display:inline-block;
      vertical-align:-3px;
      margin-right:8px;
      animation:spin .75s linear infinite;
    }

    @keyframes spin{
      from{ transform:rotate(0deg); }
      to{ transform:rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app">
    <iframe id="pdfFrame" title="PDF görüntüleyici"></iframe>

    <div id="overlay">
      <div class="card">
        <h1 id="title" class="title">PDF hazırlanıyor…</h1>
        <p id="message" class="text">
          <span class="spinner" aria-hidden="true"></span>
          PDF görüntüleyici yükleniyor…
        </p>
        <div id="actions" class="actions" hidden>
          <a id="openBtn" class="btn" href="#" target="_blank" rel="noopener">Yeni sekmede aç</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const PDFJS_VIEWER_BASE = "https://mozilla.github.io/pdf.js/web/viewer.html";

    const params = new URLSearchParams(location.search);
    const rawPdf = params.get("pdf") || "";
    const rawName = params.get("name") || "";

    const pdfFrame = document.getElementById("pdfFrame");
    const overlay = document.getElementById("overlay");
    const titleEl = document.getElementById("title");
    const messageEl = document.getElementById("message");
    const actionsEl = document.getElementById("actions");
    const openBtn = document.getElementById("openBtn");

    let timeoutId = 0;
    let settled = false;

    function decodeSafe(value){
      try{
        return decodeURIComponent(value);
      }catch{
        return value;
      }
    }

    function buildAbsoluteUrl(input){
      try{
        return new URL(decodeSafe(input), location.href).toString();
      }catch{
        return decodeSafe(input);
      }
    }

    function fileNameFromUrl(url){
      try{
        const u = new URL(url, location.href);
        const raw = (u.pathname || "").split("/").pop() || "PDF";
        return decodeSafe(raw);
      }catch{
        return "PDF";
      }
    }

    function getTitle(){
      const name = decodeSafe(rawName) || fileNameFromUrl(rawPdf);
      return String(name || "PDF")
        .replace(/\.pdf$/i, "")
        .replace(/\s+/g, " ")
        .trim() || "PDF";
    }

    function buildFreshUrl(url){
      const u = new URL(url, location.href);
      u.searchParams.set("_ts", String(Date.now()));
      return u.toString();
    }

    function buildPdfJsViewerUrl(pdfUrl){
      return `${PDFJS_VIEWER_BASE}?file=${encodeURIComponent(pdfUrl)}`;
    }

    function hideOverlay(){
      overlay.classList.add("hidden");
    }

    function showOverlay(){
      overlay.classList.remove("hidden");
    }

    function showError(text, url){
      titleEl.textContent = getTitle();
      messageEl.textContent = text || "PDF açılamadı.";
      actionsEl.hidden = false;
      openBtn.href = url || "#";
      showOverlay();
    }

    function markLoaded(){
      if (settled) return;
      settled = true;
      clearTimeout(timeoutId);
      hideOverlay();
    }

    function init(){
      const absPdfUrl = buildAbsoluteUrl(rawPdf);

      titleEl.textContent = getTitle();

      if (!absPdfUrl){
        showError("PDF yolu bulunamadı.", "#");
        pdfFrame.src = "about:blank";
        return;
      }

      const freshPdfUrl = buildFreshUrl(absPdfUrl);
      const pdfJsViewerUrl = buildPdfJsViewerUrl(freshPdfUrl);

      openBtn.href = freshPdfUrl;
      actionsEl.hidden = true;
      showOverlay();

      pdfFrame.addEventListener("load", () => {
        markLoaded();
      }, { once: true });

      pdfFrame.src = pdfJsViewerUrl;

      timeoutId = setTimeout(() => {
        if (settled) return;
        showError("Görüntüleyici geç yanıt verdi. Yeni sekmede açmayı deneyin.", freshPdfUrl);
      }, 12000);
    }

    init();
  </script>
</body>
</html>
