<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PDF</title>

  <style>
    :root{
      --bg:#eef2f7;
      --panel:#ffffff;
      --border:#d8d8d8;
      --text:#111827;
      --muted:#6b7280;
      --hover:#f8fafc;
    }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
    }

    body{
      display:flex;
      flex-direction:column;
    }

    #topbar{
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      background:var(--panel);
      border-bottom:1px solid var(--border);
      box-shadow:0 1px 0 rgba(0,0,0,.04);
      z-index:5;
    }

    #name{
      min-width:0;
      flex:1 1 auto;
      font-weight:700;
      font-size:.96rem;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    #actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex:0 0 auto;
      flex-wrap:wrap;
    }

    .btn{
      height:36px;
      padding:0 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      cursor:pointer;
      font-size:.92rem;
      font-weight:650;
    }

    .btn:hover{ background:var(--hover); }
    .btn:disabled{ opacity:.55; cursor:default; }

    #status{
      flex:0 0 auto;
      padding:8px 12px;
      background:#fff;
      color:var(--muted);
      font-size:.9rem;
      border-bottom:1px solid var(--border);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    #viewerWrap{
      flex:1 1 auto;
      overflow:auto;
      padding:12px;
      -webkit-overflow-scrolling:touch;
    }

    #viewer{
      width:100%;
      min-height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
    }

    .pageCard{
      width:fit-content;
      max-width:100%;
      background:#fff;
      border:1px solid #e5e7eb;
      box-shadow:0 8px 24px rgba(0,0,0,.08);
      border-radius:8px;
      overflow:hidden;
    }

    .pageCanvas{
      display:block;
      width:auto;
      max-width:100%;
      height:auto;
      background:#fff;
    }

    .pageMeta{
      padding:8px 10px;
      font-size:.86rem;
      color:var(--muted);
      border-top:1px solid #eee;
      background:#fff;
      text-align:center;
    }

    .loading{
      color:var(--muted);
      padding:24px 0;
      font-size:1rem;
    }

    .error{
      width:min(760px, 100%);
      background:#fff;
      border:1px solid #fecaca;
      color:#991b1b;
      border-radius:12px;
      padding:14px;
      box-shadow:0 8px 20px rgba(0,0,0,.06);
    }

    @media (max-width: 720px){
      #topbar{
        align-items:flex-start;
        flex-wrap:wrap;
      }

      #name{
        flex:1 1 100%;
        white-space:normal;
      }

      #viewerWrap{
        padding:8px;
      }
    }
  </style>
</head>
<body>
  <div id="topbar">
    <div id="name">PDF</div>
    <div id="actions">
      <button id="reloadBtn" class="btn" type="button">Yenile</button>
      <button id="downloadBtn" class="btn" type="button">İndir</button>
      <button id="copyBtn" class="btn" type="button">Hepsini kopyala</button>
      <button id="openBtn" class="btn" type="button">Yeni sekmede aç</button>
    </div>
  </div>

  <div id="status">Hazırlanıyor…</div>

  <div id="viewerWrap">
    <div id="viewer">
      <div id="loadingText" class="loading">PDF yükleniyor…</div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.js";

    const params = new URLSearchParams(location.search);
    const rawPdfUrl = params.get("pdf") || "";
    const rawName = params.get("name") || "";

    const nameEl = document.getElementById("name");
    const statusEl = document.getElementById("status");
    const viewerEl = document.getElementById("viewer");
    const reloadBtn = document.getElementById("reloadBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const copyBtn = document.getElementById("copyBtn");
    const openBtn = document.getElementById("openBtn");

    let currentBlobUrl = "";
    let lastPdfBytes = null;
    let renderToken = 0;
    let resizeTimer = null;

    function decodeSafe(value){
      try{
        return decodeURIComponent(value);
      }catch{
        return value;
      }
    }

    function sanitizeFileName(name){
      const clean = String(name || "").trim().replace(/[\\/:*?"<>|]+/g, "_");
      return clean || "document.pdf";
    }

    function ensurePdfExt(name){
      return /\.pdf$/i.test(name) ? name : `${name}.pdf`;
    }

    function fileNameFromUrl(url){
      try{
        const u = new URL(url, location.href);
        return decodeSafe((u.pathname || "").split("/").pop() || "PDF");
      }catch{
        return "PDF";
      }
    }

    function getDisplayName(){
      const base = decodeSafe(rawName).trim() || fileNameFromUrl(rawPdfUrl);
      return ensurePdfExt(sanitizeFileName(base));
    }

    function buildFreshUrl(url){
      const u = new URL(url, location.href);
      u.searchParams.set("_ts", String(Date.now()));
      return u.toString();
    }

    function setStatus(text){
      statusEl.textContent = text || "";
    }

    function clearViewer(){
      viewerEl.innerHTML = "";
    }

    function showLoading(text){
      clearViewer();
      const div = document.createElement("div");
      div.className = "loading";
      div.textContent = text || "PDF yükleniyor…";
      viewerEl.appendChild(div);
    }

    function showError(message){
      clearViewer();
      const box = document.createElement("div");
      box.className = "error";
      box.textContent = message || "PDF yüklenemedi.";
      viewerEl.appendChild(box);
      setStatus("Hata");
    }

    function revokeBlobUrl(){
      if (!currentBlobUrl) return;
      try{ URL.revokeObjectURL(currentBlobUrl); }catch{}
      currentBlobUrl = "";
    }

    function setTitle(){
      const fileName = getDisplayName();
      nameEl.textContent = fileName;
      document.title = fileName;
    }

    async function fetchPdfBytes(url){
      const res = await fetch(url, {
        mode: "cors",
        cache: "no-store",
        credentials: "omit"
      });
      if (!res.ok) throw new Error(`PDF indirilemedi (${res.status})`);
      const buf = await res.arrayBuffer();
      return new Uint8Array(buf);
    }

    function createPageCard(pageNo, totalPages, canvas){
      const card = document.createElement("div");
      card.className = "pageCard";

      const meta = document.createElement("div");
      meta.className = "pageMeta";
      meta.textContent = `Sayfa ${pageNo} / ${totalPages}`;

      canvas.className = "pageCanvas";
      card.appendChild(canvas);
      card.appendChild(meta);
      return card;
    }

    async function renderPdf(){
      const myToken = ++renderToken;

      setTitle();

      if (!rawPdfUrl){
        showError("PDF yolu bulunamadı.");
        downloadBtn.disabled = true;
        copyBtn.disabled = true;
        openBtn.disabled = true;
        return;
      }

      downloadBtn.disabled = false;
      copyBtn.disabled = false;
      openBtn.disabled = false;

      try{
        showLoading("PDF yükleniyor…");
        setStatus("PDF indiriliyor…");

        const pdfBytes = await fetchPdfBytes(buildFreshUrl(rawPdfUrl));
        if (myToken !== renderToken) return;

        lastPdfBytes = pdfBytes;

        setStatus("PDF hazırlanıyor…");
        const loadingTask = pdfjsLib.getDocument({
          data: pdfBytes,
          useWorkerFetch: false,
          isEvalSupported: false,
          disableAutoFetch: false,
          disableStream: false,
          disableRange: false
        });

        const pdf = await loadingTask.promise;
        if (myToken !== renderToken){
          try{ await loadingTask.destroy(); }catch{}
          return;
        }

        clearViewer();

        for (let pageNo = 1; pageNo <= pdf.numPages; pageNo++){
          setStatus(`Sayfa ${pageNo} / ${pdf.numPages} hazırlanıyor…`);

          const page = await pdf.getPage(pageNo);
          if (myToken !== renderToken) return;

          const baseViewport = page.getViewport({ scale: 1 });

          const wrapWidth = Math.max(320, Math.floor(viewerEl.clientWidth || window.innerWidth - 32));
          const targetWidth = Math.min(baseViewport.width, wrapWidth);
          const scale = targetWidth / baseViewport.width;
          const viewport = page.getViewport({ scale });

          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d", { alpha: false });
          const outputScale = window.devicePixelRatio || 1;

          canvas.width = Math.floor(viewport.width * outputScale);
          canvas.height = Math.floor(viewport.height * outputScale);
          canvas.style.width = `${Math.floor(viewport.width)}px`;
          canvas.style.height = `${Math.floor(viewport.height)}px`;

          const transform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null;

          await page.render({
            canvasContext: ctx,
            viewport,
            transform
          }).promise;

          if (myToken !== renderToken) return;

          viewerEl.appendChild(createPageCard(pageNo, pdf.numPages, canvas));
        }

        setStatus(`Yüklendi · ${pdf.numPages} sayfa`);
      }catch(err){
        console.error(err);
        showError(`PDF yüklenemedi: ${err?.message || "bilinmeyen hata"}`);
      }
    }

    async function downloadPdf(){
      if (!rawPdfUrl) return;

      const oldText = downloadBtn.textContent;
      downloadBtn.disabled = true;
      downloadBtn.textContent = "İndiriliyor…";

      try{
        let bytes = lastPdfBytes;
        if (!bytes) bytes = await fetchPdfBytes(buildFreshUrl(rawPdfUrl));

        const blob = new Blob([bytes], { type: "application/pdf" });
        revokeBlobUrl();
        currentBlobUrl = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = currentBlobUrl;
        a.download = getDisplayName();
        document.body.appendChild(a);
        a.click();
        a.remove();

        setStatus("İndirme başlatıldı");
      }catch(err){
        console.error(err);
        setStatus(`İndirme başarısız: ${err?.message || "bilinmeyen hata"}`);
      }finally{
        downloadBtn.disabled = false;
        downloadBtn.textContent = oldText;
      }
    }

    async function extractAllText(){
      let bytes = lastPdfBytes;
      if (!bytes) bytes = await fetchPdfBytes(buildFreshUrl(rawPdfUrl));

      const loadingTask = pdfjsLib.getDocument({
        data: bytes,
        useWorkerFetch: false,
        isEvalSupported: false
      });

      const pdf = await loadingTask.promise;
      const pages = [];

      for (let pageNo = 1; pageNo <= pdf.numPages; pageNo++){
        setStatus(`Metin çıkarılıyor: ${pageNo}/${pdf.numPages}`);
        const page = await pdf.getPage(pageNo);
        const content = await page.getTextContent();

        const pageText = (content.items || [])
          .map((item) => String(item?.str || "").trim())
          .filter(Boolean)
          .join(" ");

        pages.push(pageText);
      }

      try{ await loadingTask.destroy(); }catch{}
      return pages.join("\n\n").trim();
    }

    async function copyAllText(){
      if (!rawPdfUrl) return;

      const oldText = copyBtn.textContent;
      copyBtn.disabled = true;
      copyBtn.textContent = "Kopyalanıyor…";

      try{
        const text = await extractAllText();
        if (!text) throw new Error("PDF içinde kopyalanabilir metin bulunamadı");
        await navigator.clipboard.writeText(text);
        setStatus("Tüm metin panoya kopyalandı");
      }catch(err){
        console.error(err);
        setStatus(`Kopyalama başarısız: ${err?.message || "bilinmeyen hata"}`);
      }finally{
        copyBtn.disabled = false;
        copyBtn.textContent = oldText;
      }
    }

    function openInNewTab(){
      if (!rawPdfUrl) return;
      window.open(buildFreshUrl(rawPdfUrl), "_blank", "noopener");
    }

    reloadBtn.addEventListener("click", () => renderPdf());
    downloadBtn.addEventListener("click", () => downloadPdf());
    copyBtn.addEventListener("click", () => copyAllText());
    openBtn.addEventListener("click", () => openInNewTab());

    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (!rawPdfUrl || !lastPdfBytes) return;
        renderPdf();
      }, 180);
    });

    window.addEventListener("beforeunload", () => {
      revokeBlobUrl();
    });

    renderPdf();
  </script>
</body>
</html>
