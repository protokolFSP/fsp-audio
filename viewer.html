<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PDF</title>
  <style>
    :root{
      --bg:#f3f4f6;
      --panel:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --shadow:0 10px 30px rgba(0,0,0,.06);
    }

    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
    }

    body{
      width:100%;
      max-width:100%;
      min-width:0;
      overflow:hidden;
    }

    #app{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
    }

    #pdfFrame{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:#fff;
    }

    #overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:rgba(243,244,246,.97);
      z-index:10;
      transition:opacity .18s ease, visibility .18s ease;
    }

    #overlay.hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .card{
      width:min(720px, calc(100vw - 32px));
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:18px;
    }

    .title{
      margin:0 0 8px 0;
      font-size:1rem;
      font-weight:750;
      line-height:1.4;
      word-break:break-word;
    }

    .text{
      margin:0;
      color:var(--muted);
      line-height:1.5;
      font-size:.95rem;
      word-break:break-word;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:14px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:0 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      text-decoration:none;
      font-size:.92rem;
      font-weight:650;
      cursor:pointer;
    }

    .btn:hover{
      background:#f9fafb;
    }

    .spinner{
      width:18px;
      height:18px;
      border:2px solid #d1d5db;
      border-top-color:#2563eb;
      border-radius:999px;
      display:inline-block;
      vertical-align:-3px;
      margin-right:8px;
      animation:spin .75s linear infinite;
    }

    @keyframes spin{
      from{ transform:rotate(0deg); }
      to{ transform:rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app">
    <iframe id="pdfFrame" title="PDF görüntüleyici" referrerpolicy="no-referrer"></iframe>

    <div id="overlay">
      <div class="card">
        <h1 id="title" class="title">PDF hazırlanıyor…</h1>
        <p id="message" class="text">
          <span class="spinner" aria-hidden="true"></span>
          PDF yükleniyor…
        </p>
        <div id="actions" class="actions" hidden>
          <a id="openBtn" class="btn" href="#" target="_blank" rel="noopener">PDF’yi doğrudan aç</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const rawPdf = params.get("pdf") || "";
    const rawName = params.get("name") || "";

    const pdfFrame = document.getElementById("pdfFrame");
    const overlay = document.getElementById("overlay");
    const titleEl = document.getElementById("title");
    const messageEl = document.getElementById("message");
    const actionsEl = document.getElementById("actions");
    const openBtn = document.getElementById("openBtn");

    let failTimer = 0;

    function decodeSafe(value){
      try{
        return decodeURIComponent(value);
      }catch{
        return value;
      }
    }

    function buildAbsoluteUrl(input){
      try{
        return new URL(decodeSafe(input), location.href).toString();
      }catch{
        return decodeSafe(input);
      }
    }

    function fileNameFromUrl(url){
      try{
        const u = new URL(url, location.href);
        const raw = (u.pathname || "").split("/").pop() || "PDF";
        return decodeSafe(raw);
      }catch{
        return "PDF";
      }
    }

    function prettyTitle(value){
      return String(value || "PDF")
        .replace(/\.pdf$/i, "")
        .replace(/\s+/g, " ")
        .trim() || "PDF";
    }

    function buildFreshUrl(url){
      const u = new URL(url, location.href);
      u.searchParams.set("_ts", String(Date.now()));
      return u.toString();
    }

    function buildPdfJsViewerUrl(pdfUrl){
      return `https://mozilla.github.io/pdf.js/web/viewer.html?file=${encodeURIComponent(pdfUrl)}`;
    }

    function hideOverlay(){
      overlay.classList.add("hidden");
    }

    function showError(text, pdfUrl){
      titleEl.textContent = prettyTitle(decodeSafe(rawName) || fileNameFromUrl(pdfUrl));
      messageEl.textContent = text || "PDF açılamadı.";
      actionsEl.hidden = false;
      openBtn.href = pdfUrl || "#";
      overlay.classList.remove("hidden");
    }

    async function verifyPdf(url){
      try{
        const r = await fetch(url, {
          method: "HEAD",
          cache: "no-store",
          mode: "cors"
        });
        if (r.ok) return true;
      }catch{}

      try{
        const r = await fetch(url, {
          method: "GET",
          cache: "no-store",
          mode: "cors",
          headers: { Range: "bytes=0-1" }
        });
        return r.ok;
      }catch{
        return false;
      }
    }

    async function init(){
      const absUrl = buildAbsoluteUrl(rawPdf);

      if (!absUrl){
        showError("PDF yolu bulunamadı.", "#");
        pdfFrame.src = "about:blank";
        return;
      }

      const freshPdfUrl = buildFreshUrl(absUrl);
      const viewerUrl = buildPdfJsViewerUrl(freshPdfUrl);
      const resolvedName = decodeSafe(rawName) || fileNameFromUrl(absUrl);

      titleEl.textContent = prettyTitle(resolvedName);
      document.title = prettyTitle(resolvedName);
      openBtn.href = freshPdfUrl;

      const ok = await verifyPdf(freshPdfUrl);
      if (!ok){
        showError("PDF dosyasına erişilemedi.", freshPdfUrl);
        pdfFrame.src = "about:blank";
        return;
      }

      pdfFrame.onload = () => {
        clearTimeout(failTimer);
        hideOverlay();
      };

      pdfFrame.src = viewerUrl;

      failTimer = setTimeout(() => {
        showError("Yerleşik görüntüleyici yüklenemedi. PDF’yi doğrudan açın.", freshPdfUrl);
      }, 12000);
    }

    init().catch((err) => {
      console.error(err);
      showError("PDF yüklenemedi.", buildAbsoluteUrl(rawPdf));
    });
  </script>
</body>
</html>

<!-- 1) buildPdfViewerUrl fonksiyonu -->
<script>
  function buildPdfViewerUrl(pdfMeta){
    const pdfUrl = buildPdfAbsoluteUrl(pdfMeta.pdfPath);
    const fileName = pdfMeta.pdfName || fileNameOnly(pdfMeta.pdfPath) || "PDF";
    return `./viewer.html?pdf=${encodeURIComponent(pdfUrl)}&name=${encodeURIComponent(fileName)}`;
  }
</script>

<!-- 2) openPdfViewer fonksiyonu -->
<script>
  function openPdfViewer(it, pdfMeta){
    if (!pdfMeta) return;

    const pdfUrl = buildPdfAbsoluteUrl(pdfMeta.pdfPath);
    const viewerUrl = buildPdfViewerUrl(pdfMeta);

    pdfState.current = {
      item: it,
      meta: pdfMeta,
      url: pdfUrl,
      viewerUrl
    };

    pdfTitleEl.textContent = pdfMeta.pdfName || it.title || "PDF";
    pdfFrame.src = viewerUrl;
    pdfOverlay.classList.add("open");
    pdfOverlay.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
  }

  function closePdfViewer(){
    pdfOverlay.classList.remove("open");
    pdfOverlay.setAttribute("aria-hidden", "true");
    pdfFrame.src = "about:blank";
    pdfState.current = null;
    document.body.style.overflow = "";
  }
</script>

<!-- 3) PDF indirme listener'ı -->
<script>
  async function downloadPdfBlob(url, filename){
    try{
      const res = await fetch(url, { cache: "no-store", mode: "cors" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const blob = await res.blob();
      const objectUrl = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = objectUrl;
      a.download = filename || "document.pdf";
      document.body.appendChild(a);
      a.click();
      a.remove();

      setTimeout(() => URL.revokeObjectURL(objectUrl), 30000);
      return true;
    }catch(err){
      console.warn("PDF indirme fallback:", err);
      try{
        window.open(url, "_blank", "noopener");
      }catch{}
      return false;
    }
  }

  pdfDownloadBtn.addEventListener("click", async () => {
    if (!pdfState.current?.url) return;
    const filename = pdfState.current?.meta?.pdfName || "document.pdf";
    await downloadPdfBlob(pdfState.current.url, filename);
  });

  pdfCloseBtn.addEventListener("click", closePdfViewer);

  pdfOverlay.addEventListener("click", (e) => {
    if (e.target === pdfOverlay) closePdfViewer();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && pdfOverlay.classList.contains("open")){
      e.preventDefault();
      closePdfViewer();
    }
  });
</script>
