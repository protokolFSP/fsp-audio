<!-- /viewer.html -->
<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>PDF Görüntüleyici</title>
  <meta name="color-scheme" content="light only" />
  <style>
    :root{
      --bg:#f5f6f8;
      --panel:#ffffff;
      --border:#dcdfe4;
      --text:#111827;
      --muted:#6b7280;
      --blue:#2563eb;
      --hover:#f0f4ff;
      --shadow:0 10px 30px rgba(0,0,0,.10);
      --toolbar-h:64px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; }
    body{
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:var(--bg);
      overflow:hidden;
    }

    #app{
      height:100%;
      display:grid;
      grid-template-rows: var(--toolbar-h) 1fr;
    }

    #toolbar{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border);
      position:relative;
      z-index:5;
    }

    .group{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }

    .grow{ flex:1 1 auto; min-width:0; }

    .btn{
      height:42px;
      min-width:42px;
      padding:0 14px;
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
      color:var(--text);
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-size:.95rem;
      font-weight:650;
      line-height:1;
      user-select:none;
      white-space:nowrap;
    }

    .btn:hover{ background:var(--hover); }
    .btn:disabled{ opacity:.45; cursor:default; }

    .iconBtn{
      width:42px;
      padding:0;
    }

    .btn svg{
      width:18px;
      height:18px;
      display:block;
      stroke:currentColor;
      fill:none;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    #titleWrap{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:2px;
    }

    #docTitle{
      font-size:.98rem;
      font-weight:750;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    #docMeta{
      font-size:.85rem;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    #pageInput{
      width:72px;
      height:42px;
      padding:0 10px;
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
      font-size:1rem;
      text-align:center;
      outline:none;
    }

    #zoomLabel{
      min-width:78px;
      height:42px;
      padding:0 12px;
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      font-variant-numeric:tabular-nums;
    }

    #viewerWrap{
      position:relative;
      overflow:auto;
      padding:20px;
      -webkit-overflow-scrolling:touch;
    }

    #viewer{
      position:relative;
      margin:0 auto;
      width:max-content;
      min-width:100%;
    }

    .pageShell{
      position:relative;
      margin:0 auto 20px auto;
      background:#fff;
      border:1px solid var(--border);
      border-radius:10px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .canvasWrap{
      position:relative;
      background:#fff;
      line-height:0;
    }

    canvas.pageCanvas{
      display:block;
      width:100%;
      height:auto;
      background:#fff;
    }

    .textLayer{
      position:absolute;
      inset:0;
      overflow:hidden;
      line-height:1;
      text-size-adjust:none;
      transform-origin:0 0;
      z-index:2;
    }

    .textLayer :is(span, br){
      color:transparent;
      position:absolute;
      white-space:pre;
      cursor:text;
      transform-origin:0 0;
    }

    .textLayer .highlight{
      margin:-1px;
      padding:1px;
      background:rgba(180,0,170,.20);
      border-radius:4px;
    }

    .textLayer .highlight.appended{ position:initial; }
    .textLayer .highlight.begin{ border-radius:4px 0 0 4px; }
    .textLayer .highlight.end{ border-radius:0 4px 4px 0; }
    .textLayer .highlight.middle{ border-radius:0; }

    #loading,
    #errorBox{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      z-index:10;
      background:#fff;
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:var(--shadow);
      padding:18px 20px;
      min-width:min(92vw,420px);
    }

    #loading{ display:none; }
    #errorBox{ display:none; }

    #loading.on,
    #errorBox.on{ display:block; }

    #loadingTitle,
    #errorTitle{
      font-size:1rem;
      font-weight:800;
      margin:0 0 6px 0;
    }

    #loadingText,
    #errorText{
      font-size:.94rem;
      color:var(--muted);
      line-height:1.35;
      margin:0;
      white-space:pre-wrap;
      word-break:break-word;
    }

    #errorActions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    @media (max-width: 820px){
      #toolbar{
        height:auto;
        min-height:var(--toolbar-h);
        flex-wrap:wrap;
      }
      .grow{ order:-1; width:100%; }
      #viewerWrap{ padding:12px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <div class="group grow">
        <div id="titleWrap">
          <div id="docTitle">PDF</div>
          <div id="docMeta">Yükleniyor…</div>
        </div>
      </div>

      <div class="group">
        <button id="prevBtn" class="btn iconBtn" type="button" title="Önceki sayfa" aria-label="Önceki sayfa">
          <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>

        <input id="pageInput" type="text" inputmode="numeric" value="1" aria-label="Sayfa numarası" />

        <div id="pageCountBtn" class="btn" aria-label="Toplam sayfa">/ 0</div>

        <button id="nextBtn" class="btn iconBtn" type="button" title="Sonraki sayfa" aria-label="Sonraki sayfa">
          <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>

      <div class="group">
        <button id="zoomOutBtn" class="btn iconBtn" type="button" title="Küçült" aria-label="Küçült">
          <svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
        </button>

        <div id="zoomLabel" aria-label="Yakınlaştırma">100%</div>

        <button id="zoomInBtn" class="btn iconBtn" type="button" title="Büyüt" aria-label="Büyüt">
          <svg viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        </button>

        <button id="fitBtn" class="btn" type="button" title="Sayfa genişliğine sığdır">Fit</button>
      </div>

      <div class="group">
        <button id="openBtn" class="btn" type="button" title="Yeni sekmede aç">Yeni sekme</button>
        <button id="downloadBtn" class="btn" type="button" title="İndir">İndir</button>
      </div>
    </div>

    <div id="viewerWrap">
      <div id="viewer"></div>

      <div id="loading" class="on" role="status" aria-live="polite">
        <div id="loadingTitle">PDF yükleniyor</div>
        <p id="loadingText">Belge hazırlanıyor…</p>
      </div>

      <div id="errorBox" role="alert">
        <div id="errorTitle">PDF açılamadı</div>
        <p id="errorText">Bir hata oluştu.</p>
        <div id="errorActions">
          <button id="retryBtn" class="btn" type="button">Tekrar dene</button>
          <button id="fallbackOpenBtn" class="btn" type="button">Yeni sekmede aç</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.6.205/build/pdf.min.mjs";
    import { TextLayer } from "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.6.205/web/pdf_viewer.min.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.6.205/build/pdf.worker.min.mjs";

    const params = new URLSearchParams(location.search);
    const pdfUrl = params.get("pdf") || params.get("file") || "";
    const docName = params.get("name") || "PDF";

    const viewerWrap = document.getElementById("viewerWrap");
    const viewerEl = document.getElementById("viewer");
    const loadingEl = document.getElementById("loading");
    const loadingTextEl = document.getElementById("loadingText");
    const errorBoxEl = document.getElementById("errorBox");
    const errorTextEl = document.getElementById("errorText");

    const docTitleEl = document.getElementById("docTitle");
    const docMetaEl = document.getElementById("docMeta");
    const pageInputEl = document.getElementById("pageInput");
    const pageCountBtnEl = document.getElementById("pageCountBtn");
    const zoomLabelEl = document.getElementById("zoomLabel");

    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const zoomOutBtn = document.getElementById("zoomOutBtn");
    const zoomInBtn = document.getElementById("zoomInBtn");
    const fitBtn = document.getElementById("fitBtn");
    const openBtn = document.getElementById("openBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const retryBtn = document.getElementById("retryBtn");
    const fallbackOpenBtn = document.getElementById("fallbackOpenBtn");

    const state = {
      pdfDoc: null,
      pageCount: 0,
      currentPage: 1,
      scale: 1,
      fitMode: true,
      pageViews: [],
      renderToken: 0
    };

    function setLoading(on, text = "Belge hazırlanıyor…") {
      loadingTextEl.textContent = text;
      loadingEl.classList.toggle("on", on);
    }

    function setError(message) {
      errorTextEl.textContent = message || "Bilinmeyen hata.";
      errorBoxEl.classList.add("on");
    }

    function clearError() {
      errorBoxEl.classList.remove("on");
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function updateToolbar() {
      const count = state.pageCount || 0;
      const page = clamp(state.currentPage, 1, Math.max(1, count || 1));

      docTitleEl.textContent = decodeURIComponentSafe(docName);
      docMetaEl.textContent = pdfUrl ? decodeURIComponentSafe(pdfUrl) : "PDF URL eksik";
      pageInputEl.value = String(page);
      pageCountBtnEl.textContent = `/ ${count}`;
      zoomLabelEl.textContent = `${Math.round(state.scale * 100)}%`;

      prevBtn.disabled = page <= 1;
      nextBtn.disabled = page >= count;
      zoomOutBtn.disabled = state.scale <= 0.35;
      zoomInBtn.disabled = state.scale >= 4;
      fitBtn.disabled = !count;
      openBtn.disabled = !pdfUrl;
      downloadBtn.disabled = !pdfUrl;
    }

    function decodeURIComponentSafe(value) {
      try {
        return decodeURIComponent(value);
      } catch {
        return value;
      }
    }

    function estimateFitScale(viewportWidth, pageWidth) {
      const horizontalPadding = 2;
      const available = Math.max(320, viewportWidth - 24 - horizontalPadding);
      return clamp(available / pageWidth, 0.35, 4);
    }

    async function createPageShell(pageNumber) {
      const page = await state.pdfDoc.getPage(pageNumber);
      const baseViewport = page.getViewport({ scale: 1 });

      const shell = document.createElement("section");
      shell.className = "pageShell";
      shell.dataset.pageNumber = String(pageNumber);

      const wrap = document.createElement("div");
      wrap.className = "canvasWrap";

      const canvas = document.createElement("canvas");
      canvas.className = "pageCanvas";

      const textLayerDiv = document.createElement("div");
      textLayerDiv.className = "textLayer";

      wrap.appendChild(canvas);
      wrap.appendChild(textLayerDiv);
      shell.appendChild(wrap);
      viewerEl.appendChild(shell);

      return {
        pageNumber,
        page,
        baseViewport,
        shell,
        wrap,
        canvas,
        textLayerDiv,
        renderTask: null,
        renderedScale: 0
      };
    }

    async function buildAllPages() {
      viewerEl.innerHTML = "";
      state.pageViews = [];

      for (let pageNumber = 1; pageNumber <= state.pageCount; pageNumber += 1) {
        const view = await createPageShell(pageNumber);
        state.pageViews.push(view);
      }
    }

    async function renderPageView(view, token) {
      if (!view || token !== state.renderToken) return;

      if (view.renderTask) {
        try {
          view.renderTask.cancel();
        } catch {}
        view.renderTask = null;
      }

      const outputScale = Math.max(1, window.devicePixelRatio || 1);
      const viewport = view.page.getViewport({ scale: state.scale });

      const canvas = view.canvas;
      const context = canvas.getContext("2d", { alpha: false });

      canvas.width = Math.floor(viewport.width * outputScale);
      canvas.height = Math.floor(viewport.height * outputScale);
      canvas.style.width = `${viewport.width}px`;
      canvas.style.height = `${viewport.height}px`;

      view.wrap.style.width = `${viewport.width}px`;
      view.wrap.style.height = `${viewport.height}px`;
      view.shell.style.width = `${viewport.width}px`;

      view.textLayerDiv.replaceChildren();
      view.textLayerDiv.style.width = `${viewport.width}px`;
      view.textLayerDiv.style.height = `${viewport.height}px`;

      const transform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null;

      const renderContext = {
        canvasContext: context,
        viewport,
        transform
      };

      view.renderTask = view.page.render(renderContext);

      await view.renderTask.promise;
      if (token !== state.renderToken) return;

      const textContent = await view.page.getTextContent();
      if (token !== state.renderToken) return;

      const textLayer = new TextLayer({
        container: view.textLayerDiv,
        textContentSource: textContent,
        viewport
      });

      await textLayer.render();
      view.renderedScale = state.scale;
    }

    async function renderAllPages() {
      if (!state.pdfDoc) return;

      state.renderToken += 1;
      const token = state.renderToken;

      setLoading(true, "Sayfalar çiziliyor…");
      clearError();

      try {
        for (const view of state.pageViews) {
          await renderPageView(view, token);
          if (token !== state.renderToken) return;
        }
        setLoading(false);
        updateToolbar();
        scrollToPage(state.currentPage, false);
      } catch (error) {
        if (error?.name === "RenderingCancelledException") return;
        setLoading(false);
        setError(`Render hatası:\n${error?.message || String(error)}`);
      }
    }

    function findCurrentPageFromScroll() {
      const wrapTop = viewerWrap.getBoundingClientRect().top;
      let bestPage = 1;
      let bestDistance = Infinity;

      for (const view of state.pageViews) {
        const rect = view.shell.getBoundingClientRect();
        const distance = Math.abs(rect.top - wrapTop - 20);
        if (distance < bestDistance) {
          bestDistance = distance;
          bestPage = view.pageNumber;
        }
      }

      state.currentPage = bestPage;
      updateToolbar();
    }

    function scrollToPage(pageNumber, smooth = true) {
      const view = state.pageViews[pageNumber - 1];
      if (!view) return;

      view.shell.scrollIntoView({
        behavior: smooth ? "smooth" : "auto",
        block: "start",
        inline: "nearest"
      });
    }

    async function applyFit() {
      if (!state.pdfDoc || !state.pageViews.length) return;
      const first = state.pageViews[0];
      const newScale = estimateFitScale(viewerWrap.clientWidth, first.baseViewport.width);
      if (Math.abs(newScale - state.scale) < 0.001) {
        updateToolbar();
        return;
      }
      state.scale = newScale;
      state.fitMode = true;
      updateToolbar();
      await renderAllPages();
    }

    async function setScale(nextScale, fitMode = false) {
      const clamped = clamp(nextScale, 0.35, 4);
      if (Math.abs(clamped - state.scale) < 0.001 && fitMode === state.fitMode) {
        updateToolbar();
        return;
      }
      state.scale = clamped;
      state.fitMode = fitMode;
      updateToolbar();
      await renderAllPages();
    }

    async function loadPdf() {
      clearError();

      if (!pdfUrl) {
        setLoading(false);
        setError("URL parametresi eksik. viewer.html?pdf=PDF_URL&name=DOSYA_ADI kullan.");
        updateToolbar();
        return;
      }

      setLoading(true, "PDF indiriliyor…");

      try {
        const loadingTask = pdfjsLib.getDocument({
          url: pdfUrl,
          withCredentials: false,
          cMapPacked: true,
          enableXfa: true,
          isEvalSupported: true,
          useWorkerFetch: true,
          disableRange: false,
          disableStream: false,
          disableAutoFetch: false
        });

        const pdfDoc = await loadingTask.promise;
        state.pdfDoc = pdfDoc;
        state.pageCount = pdfDoc.numPages;
        state.currentPage = 1;

        updateToolbar();
        setLoading(true, `Sayfalar hazırlanıyor… (${state.pageCount})`);

        await buildAllPages();
        await applyFit();

        setLoading(false);
        updateToolbar();
      } catch (error) {
        setLoading(false);
        setError(`PDF yüklenemedi.\n${error?.message || String(error)}\n\nCORS veya bozuk PDF olabilir.`);
        updateToolbar();
      }
    }

    prevBtn.addEventListener("click", () => {
      state.currentPage = clamp(state.currentPage - 1, 1, state.pageCount || 1);
      updateToolbar();
      scrollToPage(state.currentPage);
    });

    nextBtn.addEventListener("click", () => {
      state.currentPage = clamp(state.currentPage + 1, 1, state.pageCount || 1);
      updateToolbar();
      scrollToPage(state.currentPage);
    });

    pageInputEl.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      const next = Number(pageInputEl.value);
      if (!Number.isFinite(next)) {
        pageInputEl.value = String(state.currentPage);
        return;
      }
      state.currentPage = clamp(Math.round(next), 1, state.pageCount || 1);
      updateToolbar();
      scrollToPage(state.currentPage);
    });

    zoomOutBtn.addEventListener("click", async () => {
      await setScale(state.scale / 1.15, false);
    });

    zoomInBtn.addEventListener("click", async () => {
      await setScale(state.scale * 1.15, false);
    });

    fitBtn.addEventListener("click", async () => {
      await applyFit();
    });

    openBtn.addEventListener("click", () => {
      if (!pdfUrl) return;
      window.open(pdfUrl, "_blank", "noopener,noreferrer");
    });

    fallbackOpenBtn.addEventListener("click", () => {
      if (!pdfUrl) return;
      window.open(pdfUrl, "_blank", "noopener,noreferrer");
    });

    downloadBtn.addEventListener("click", () => {
      if (!pdfUrl) return;
      const a = document.createElement("a");
      a.href = pdfUrl;
      a.download = decodeURIComponentSafe(docName || "document.pdf");
      a.rel = "noopener";
      a.target = "_blank";
      document.body.appendChild(a);
      a.click();
      a.remove();
    });

    retryBtn.addEventListener("click", async () => {
      await loadPdf();
    });

    let scrollTimer = 0;
    viewerWrap.addEventListener("scroll", () => {
      window.clearTimeout(scrollTimer);
      scrollTimer = window.setTimeout(findCurrentPageFromScroll, 60);
    }, { passive: true });

    let resizeTimer = 0;
    window.addEventListener("resize", () => {
      if (!state.pdfDoc) return;
      window.clearTimeout(resizeTimer);
      resizeTimer = window.setTimeout(async () => {
        if (state.fitMode) {
          await applyFit();
        } else {
          updateToolbar();
        }
      }, 120);
    });

    document.addEventListener("keydown", async (event) => {
      if (event.target && /input|textarea/i.test(event.target.tagName)) return;

      if (event.key === "ArrowLeft") {
        event.preventDefault();
        prevBtn.click();
      } else if (event.key === "ArrowRight") {
        event.preventDefault();
        nextBtn.click();
      } else if (event.key === "+" || event.key === "=") {
        event.preventDefault();
        await setScale(state.scale * 1.15, false);
      } else if (event.key === "-") {
        event.preventDefault();
        await setScale(state.scale / 1.15, false);
      } else if (event.key === "0") {
        event.preventDefault();
        await applyFit();
      }
    });

    updateToolbar();
    await loadPdf();
  </script>
</body>
</html>
