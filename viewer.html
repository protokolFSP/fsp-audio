<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDF Görüntüleyici</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 16px 18px;
    }

    .title-wrap {
      min-width: 0;
      flex: 1 1 360px;
    }

    .title {
      margin: 0;
      font-size: 18px;
      line-height: 1.4;
      word-break: break-word;
    }

    .meta {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
      word-break: break-all;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
    }

    .btn:disabled,
    .btn[aria-disabled="true"] {
      opacity: 0.5;
      pointer-events: none;
      cursor: not-allowed;
    }

    .viewer {
      flex: 1;
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 140px);
      border: 0;
      display: block;
      background: #eef2f7;
    }

    .error {
      padding: 24px;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <section class="topbar">
    <div class="title-wrap">
      <h1 id="title" class="title">PDF yükleniyor...</h1>
      <div id="meta" class="meta">Dosya bilgisi yükleniyor...</div>
    </div>

    <div class="actions">
      <button id="reloadBtn" class="btn" type="button">Yenile</button>
    </div>
  </section>

  <section class="viewer">
    <iframe id="pdfViewer" title="PDF Görüntüleyici"></iframe>
    <div id="errorBox" class="error" hidden>PDF yolu bulunamadı.</div>
  </section>

  <script>
    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function formatTitle(fileName) {
      return (fileName || "PDF")
        .replace(/\.pdf$/i, "")
        .replace(/[_-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    const pdf = getParam("pdf");
    const name = getParam("name");

    const titleEl = document.getElementById("title");
    const metaEl = document.getElementById("meta");
    const pdfViewer = document.getElementById("pdfViewer");
    const errorBox = document.getElementById("errorBox");
    const reloadBtn = document.getElementById("reloadBtn");

    reloadBtn.addEventListener("click", () => {
      location.reload();
    });

    if (!pdf || !name) {
      titleEl.textContent = "PDF yolu bulunamadı.";
      metaEl.textContent = `pdf=${String(pdf)} | name=${String(name)}`;
      pdfViewer.hidden = true;
      errorBox.hidden = false;
      errorBox.textContent = "PDF yolu bulunamadı.\n\nURL parametreleri eksik.\n\nBeklenen: ?pdf=...&name=...";
    } else {
      const pdfUrl = decodeURIComponent(pdf);
      titleEl.textContent = formatTitle(name);
      metaEl.textContent = pdfUrl;
      pdfViewer.src = `https://mozilla.github.io/pdf.js/web/viewer.html?file=${encodeURIComponent(pdfUrl)}`;
      pdfViewer.hidden = false;
      errorBox.hidden = true;
    }
  </script>
</body>
</html>
